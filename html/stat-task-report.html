<div class="text-center mb-3">
    <select class="form-select form-select-sm d-inline-block w-auto task-report-select"></select>
</div>

<p class="task-report-empty text-center text-secondary" data-i18n="stats.taskReport.noTask">Задача не вибрана</p>

<div class="task-report-content d-none">
    <h5 class="text-center mb-1 task-report-title"></h5>
    <p class="text-center text-secondary task-report-description mb-2"></p>
    <hr class="task-report-divider" />

    <div class="diagrams-container d-flex flex-wrap justify-content-center">
        <div class="row row-template d-none">
            <div class="col-1 px-2"><div class="legend-color"></div></div>
            <div class="col-8 px-2"></div>
            <div class="col-3 px-2 text-end"></div>
        </div>

        <div class="diagram-container diagram-container-goal mx-3 mb-4 p-2">
            <h6 class="text-center h6" data-i18n="stats.taskReport.charts.goal">Виконання цілі</h6>
            <div class="diagram"></div>
            <div class="legend"></div>
        </div>
        <div class="diagram-container diagram-container-goal-total mx-3 mb-4 p-2">
            <h6 class="text-center h6" data-i18n="stats.taskReport.charts.goalTotal">Загальне виконання цілі</h6>
            <div class="diagram"></div>
            <div class="legend"></div>
        </div>
        <div class="diagram-container diagram-container-share mx-3 mb-4 p-2">
            <h6 class="text-center h6" data-i18n="stats.taskReport.charts.share">Частка задачі</h6>
            <div class="diagram"></div>
            <div class="legend"></div>
        </div>
        <div class="diagram-container diagram-container-share-total mx-3 mb-4 p-2">
            <h6 class="text-center h6" data-i18n="stats.taskReport.charts.shareTotal">Повна частка задачі</h6>
            <div class="diagram"></div>
            <div class="legend"></div>
        </div>
        <div class="diagram-container diagram-container-share-aim mx-3 mb-4 p-2">
            <h6 class="text-center h6" data-i18n="stats.taskReport.charts.shareAim">Цільова частка задачі</h6>
            <div class="diagram"></div>
            <div class="legend"></div>
        </div>

        <div class="diagram-container diagram-container-wide diagram-container-weekday mx-3 mb-4 p-2">
            <h6 class="text-center h6" data-i18n="stats.taskReport.charts.weekday">Активність по дням тижня</h6>
            <div class="sb-chart"></div>
            <p class="text-center text-secondary sb-caption weekday-caption m-0"></p>
        </div>
        <div class="diagram-container diagram-container-wide diagram-container-hour mx-3 mb-4 p-2">
            <h6 class="text-center h6" data-i18n="stats.taskReport.charts.hour">Активність по годинам</h6>
            <div class="sb-chart"></div>
            <p class="text-center text-secondary sb-caption hour-caption m-0"></p>
        </div>
    </div>

    <table class="task-report-table">
        <thead>
            <tr>
                <th data-i18n="stats.taskReport.table.indicator">Показник</th>
                <th data-i18n="stats.taskReport.table.value">Значення</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
