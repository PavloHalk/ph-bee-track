<h1 class="text-center h4 mb-5">Ваша бджілка</h1>
<form name="user-profile" class="w-600 mx-auto">
    <div class="row mx-0">
        <div class="col col-3>">
            <label for="username">Ім'я</label>
        </div>
        <div class="col col-9">
            <input id="username" name="username" value="" autofocus />
            <p class="field-error-msg"></p>
        </div>
    </div>
    <div class="row mx-0">
        <div class="col col-3>">
            <label for="reg_date">Дата реєстрації</label>
        </div>
        <div class="col col-9">
            <input id="reg_date" name="reg_date" value="" disabled />
            <p class="field-error-msg"></p>
        </div>
    </div>
    <div class="row mx-0">
        <div class="col col-12 text-center">
            <span class="btn btn-primary btn-update mb-2">Зберегти</span>
            <span class="btn btn-primary btn-update-close mb-2">Зберегти і закрити</span>
            <span class="btn btn-danger btn-logout mb-2">Вийти з профілю</span>
            <span class="btn btn-outline-primary btn-cancel mb-2">Скасувати</span>
        </div>
    </div>
</form>
