<h1 class="text-center h4 mb-5">Ваша бджілка</h1>
<form name="user-profile" class="w-600 mx-auto">
    <div class="row mx-0">
        <div class="col col-3>">
            <label for="username">Ім'я</label>
        </div>
        <div class="col col-9">
            <input id="username" name="username" value="" autofocus />
            <p class="field-error-msg"></p>
        </div>
    </div>
    <div class="row mx-0">
        <div class="col col-3>">
            <label for="reg_date">Дата реєстрації</label>
        </div>
        <div class="col col-9">
            <input id="reg_date" name="reg_date" value="" disabled />
            <p class="field-error-msg"></p>
        </div>
    </div>
    <div class="row mx-0">
        <div class="col text-center">
            <input type="button" name="btn-update" value="Зберегти" />
            <input type="button" name="btn-update-close" value="Зберегти і закрити" />
            <input type="button" name="btn-logout" value="Вийти з профілю" />
            <input type="button" name="btn-cancel" value="Скасувати" />
        </div>
    </div>
</form>
