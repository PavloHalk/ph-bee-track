<!DOCTYPE html>
<html lang="ua">
<head>
    <title>BeeTrack</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="./css/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/app.css" />
    <script type="module" src="./js/app.js"></script>
</head>

<body class="d-flex flex-column vh-100">
<header class="bg-light text-dark-emphasis py-2 shadow flex-shrink-0">
    <div class="row m-0">
        <div class="col col-9 d-flex align-items-center">
            <h1 class="m-0 flex-shrink-0"><img class="logo" src="./img/logo.png" alt="BeeTrack logo" /> BeeTrack</h1>
            <div class="header-timer d-none ms-3">
                <span class="header-timer-color"></span>
                <span class="header-timer-name"></span>
                <span class="header-timer-clock timer"><span class="h">0</span>:<span class="m">00</span>:<span class="s">00</span></span>
                <span class="btn btn-sm btn-success btn-start disabled" data-i18n="tasks.card.start">Старт</span>
                <span class="btn btn-sm btn-danger btn-stop disabled" data-i18n="tasks.card.stop">Стоп</span>
                <div class="btn-stop-alarm d-none">
                    <img src="./img/logo.png" alt="Alarm" />
                    <span data-i18n="tasks.card.stopAlarm">Вимкнути сповіщення</span>
                </div>
            </div>
        </div>
        <div class="col col-3 d-flex justify-content-end">
            <div class="profile" hidden>
                <p class="text-center m-0"><img src="./img/profile.png" alt="Profile image" /></p>
                <p class="username text-center m-0">Немає профілю</p>
            </div>
        </div>
    </div>
    <div class="row m-0">
        <div class="col col-12">
            <span class="btn btn-outline-primary btn-xs btn-stat d-none" data-i18n="header.stats">Статистика</span>
            <span class="btn btn-outline-primary btn-xs btn-tasks d-none" data-i18n="header.tasks">Задачі</span>
            <span class="btn btn-outline-primary btn-xs btn-about" data-i18n="header.about">Про BeeTrack</span>
        </div>
    </div>
</header>
<main id="app" class="flex-grow-1 pt-3 overflow-auto"></main>
<footer class="bg-light flex-shrink-0">
    <div class="row m-0 align-items-center">
        <div class="col col-4 text-start">
            <select class="form-select form-select-sm d-inline-block w-auto lang-select" name="lang" data-i18n-title="footer.language"></select>
        </div>
        <div class="col col-4 text-center">
            <p class="text-black-50 m-0"><small><small>Version <span class="app-version"></span></small></small></p>
        </div>
        <div class="col col-4 text-end github">
            <a href="https://github.com/PavloHalk/ph-bee-track" target="_blank" title="BeeTrack on GitHub">
                <img src="./img/github.png" alt="BeeTrack on GitHub" />
            </a>
        </div>
    </div>
</footer>
</body>
</html>
