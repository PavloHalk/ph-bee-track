<!DOCTYPE html>
<html lang="ua">
<head>
    <title>BeeTrack</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="favicon.ico">
    <link rel="stylesheet" href="./css/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/app.css" />
    <script type="module" src="./js/app.js"></script>
</head>

<body class="d-flex flex-column min-vh-100">
<header class="bg-light text-dark-emphasis py-3 shadow">
    <div class="row m-0">
        <div class="col col-9">
            <h1 class="m-0"><img class="logo" src="./img/logo.png" alt="BeeTrack logo" /> BeeTrack</h1>
        </div>
        <div class="col col-3 d-flex justify-content-end">
            <div class="profile" hidden>
                <p class="text-center m-0"><img src="./img/profile.png" alt="Profile image" /></p>
                <p class="username text-center m-0">Немає профілю</p>
            </div>
        </div>
    </div>
</header>
<main id="app" class="flex-grow-1 pt-3"></main>
<footer class="bg-light text-center">
    <p class="text-black-50"><small><small>Version 0.1 alpha</small></small></p>
</footer>
</body>
</html>
